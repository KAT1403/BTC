<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC Markets</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lexend:wght@100..900&family=Playwrite+AU+QLD:wght@100..400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img src="./icons/logo.png" alt="BTC Markets" width="50" height="50"/>
          <span>btc markets</span>
        </div>
        <div class="linkers">
          <ul>
            <li>Products</li>
            <li>Prices</li>
            <li>Buy</li>
            <li>OTC</li>
            <li>Learn</li>
            <li>Help</li>
          </ul>
        </div>
        <div class="auth">
          <button class="primary-btn">Log in</button>
          <button class="secondary-btn">Sign up</button>
        </div>
      </div>
    </div>
  </body>
</html>
